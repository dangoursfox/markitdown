<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkItDown - 智能文档转 Markdown</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .upload-area {
            background: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: var(--border);
            cursor: not-allowed;
        }

        .status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .result-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .tab-buttons {
            display: flex;
            gap: 1rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid var(--border);
            min-height: 400px;
            max-height: 800px;
            overflow-y: auto;
        }

        pre code {
            border-radius: 0.5rem;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
        }

        .markdown-body {
            color: var(--text);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3rem;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>MarkItDown</h1>
        <p>微软开源：将 PDF、Word、图片轻松转换为 Markdown</p>
    </header>

    <div class="container">
        <label for="fileInput" class="upload-area" id="dropZone">
            <span class="upload-icon">📄</span>
            <h3>点击或拖拽文件到这里</h3>
            <p class="status">支持 PDF, Docx, Xlsx, Pptx, 图片, HTML 等格式</p>
            <input type="file" id="fileInput">
            <div id="spinner" class="spinner"></div>
        </label>

        <div id="resultContainer" class="result-container">
            <div class="result-header">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showTab('preview')">预览</button>
                    <button class="tab-btn" onclick="showTab('raw')">源码</button>
                </div>
                <div>
                    <button class="copy-btn" onclick="copyResult()">复制内容</button>
                    <button class="copy-btn" onclick="downloadResult()" style="background: var(--primary)">下载 .md</button>
                </div>
            </div>
            
            <div id="contentCard" class="content-card">
                <div id="previewArea" class="markdown-body"></div>
                <pre id="rawArea" style="display: none;"><code class="language-markdown" id="rawCode"></code></pre>
            </div>
        </div>
    </div>

    <footer>
        <p>Optimized for NAS | Powered by Microsoft MarkItDown & FastAPI</p>
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const spinner = document.getElementById('spinner');
        const resultContainer = document.getElementById('resultContainer');
        const previewArea = document.getElementById('previewArea');
        const rawCode = document.getElementById('rawCode');
        const rawArea = document.getElementById('rawArea');
        let currentMarkdown = '';
        let currentFilename = '';

        // Drag and Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        }, false);

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            spinner.style.display = 'block';
            resultContainer.style.display = 'none';
            currentFilename = file.name;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('转换失败');

                const data = await response.json();
                currentMarkdown = data.content;
                
                renderMarkdown(currentMarkdown);
                resultContainer.style.display = 'block';
                showTab('preview');
                
            } catch (error) {
                alert('错误: ' + error.message);
            } finally {
                spinner.style.display = 'none';
            }
        }

        function renderMarkdown(md) {
            previewArea.innerHTML = marked.parse(md);
            rawCode.textContent = md;
            hljs.highlightElement(rawCode);
        }

        function showTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            if (type === 'preview') {
                previewArea.style.display = 'block';
                rawArea.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                previewArea.style.display = 'none';
                rawArea.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        function copyResult() {
            navigator.clipboard.writeText(currentMarkdown).then(() => {
                alert('已复制到剪贴板');
            });
        }

        function downloadResult() {
            const blob = new Blob([currentMarkdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const name = currentFilename.split('.')[0] + '.md';
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
